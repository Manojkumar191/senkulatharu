<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 350">
  <!-- Background -->
  <rect width="300" height="350" fill="#D4A54F"/>
  
  <!-- Wheat stalks at bottom -->
  <g id="wheat">
    <line x1="20" y1="280" x2="25" y2="200" stroke="#DAA520" stroke-width="2"/>
    <line x1="40" y1="280" x2="38" y2="210" stroke="#DAA520" stroke-width="2"/>
    <line x1="60" y1="280" x2="62" y2="220" stroke="#DAA520" stroke-width="2"/>
    <line x1="80" y1="280" x2="78" y2="200" stroke="#DAA520" stroke-width="2"/>
    <line x1="100" y1="280" x2="102" y2="210" stroke="#DAA520" stroke-width="2"/>
    <line x1="120" y1="280" x2="118" y2="220" stroke="#DAA520" stroke-width="2"/>
    <line x1="140" y1="280" x2="142" y2="200" stroke="#DAA520" stroke-width="2"/>
    <line x1="160" y1="280" x2="158" y2="210" stroke="#DAA520" stroke-width="2"/>
    <line x1="180" y1="280" x2="182" y2="220" stroke="#DAA520" stroke-width="2"/>
    <line x1="200" y1="280" x2="198" y2="200" stroke="#DAA520" stroke-width="2"/>
    <line x1="220" y1="280" x2="222" y2="210" stroke="#DAA520" stroke-width="2"/>
    <line x1="240" y1="280" x2="238" y2="220" stroke="#DAA520" stroke-width="2"/>
    <line x1="260" y1="280" x2="262" y2="200" stroke="#DAA520" stroke-width="2"/>
    <line x1="280" y1="280" x2="278" y2="210" stroke="#DAA520" stroke-width="2"/>
  </g>
  
  <!-- Farmer circle (simplified) -->
  <circle cx="70" cy="100" r="35" fill="#D2B48C"/>
  
  <!-- Head -->
  <circle cx="70" cy="85" r="20" fill="#C4996B"/>
  
  <!-- Face -->
  <circle cx="65" cy="82" r="3" fill="#333"/>
  <circle cx="75" cy="82" r="3" fill="#333"/>
  <line x1="70" y1="88" x2="70" y2="92" stroke="#333" stroke-width="1.5"/>
  
  <!-- Body -->
  <ellipse cx="70" cy="115" rx="18" ry="22" fill="#4A5859"/>
  
  <!-- Text -->
  <text x="150" y="60" font-size="20" font-weight="bold" fill="#2C3E50">
    Dryland Farmer
  </text>
  <text x="150" y="90" font-size="14" fill="#2C3E50">
    Organic Rice Cultivation
  </text>
  <text x="150" y="110" font-size="12" fill="#666">
    20+ years of sustainable
  </text>
  <text x="150" y="128" font-size="12" fill="#666">
    farming experience
  </text>
  <text x="150" y="160" font-size="13" font-weight="bold" fill="#2C3E50">
    Supporting family &amp; community
  </text>
  <text x="150" y="180" font-size="13" font-weight="bold" fill="#2C3E50">
    through organic produce
  </text>
  
  <!-- Award star -->
  <text x="260" y="50" font-size="32">⭐</text>
</svg>